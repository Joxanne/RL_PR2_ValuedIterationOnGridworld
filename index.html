<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Value Iteration Gridworld</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Load FontAwesome for arrows -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Value Iteration Gridworld</h1>
            <p>Interactive reinforcement learning visualization</p>
        </header>

        <div class="controls">
            <div class="size-selector" style="display: flex; align-items: center; gap: 0.5rem; background: var(--grid-bg); padding: 0.5rem 1rem; border-radius: 0.5rem;">
                <label for="gridSize" style="font-weight: 600; font-size: 0.9rem;">Grid Size:</label>
                <input type="number" id="gridSize" value="5" min="3" max="25" style="width: 60px; border-radius: 0.25rem; border: 1px solid var(--cell-border); background: var(--cell-bg); color: var(--text-primary); padding: 0.4rem; font-weight: bold; text-align: center;">
                <button id="updateSizeBtn" style="padding: 0.4rem 0.8rem; font-size: 0.9rem;">Update</button>
            </div>
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="obstacle">Toggle Obstacles</button>
                <button class="mode-btn" data-mode="start">Set Start</button>
                <button class="mode-btn" data-mode="end">Set End</button>
            </div>
            <button class="solve-btn" id="solveBtn">Run Value Iteration</button>
            <button class="solve-btn reset-btn" id="resetBtn">Reset</button>
            <div class="view-toggles">
                <label><input type="checkbox" id="showValues" selected checked> Show Values</label>
                <label><input type="checkbox" id="showPolicy" selected checked> Show Policy</label>
            </div>
        </div>

        <div class="grid-container" id="grid">
            <!-- Grid generated by JS -->
        </div>

        <div class="info-panel">
            <h3>Legend</h3>
            <div class="legend">
                <div class="legend-item">
                    <div class="cell-preview start"></div> Start
                </div>
                <div class="legend-item">
                    <div class="cell-preview end"></div> Goal
                </div>
                <div class="legend-item">
                    <div class="cell-preview obstacle"></div> Obstacle
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
